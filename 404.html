<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando…</title>
  <script>
    // GitHub Pages sirve este 404.html cuando la ruta no existe como archivo.
    // Funciona con dominio propio (topfut.online/arg-vs-mex) y con rutas de
    // github.io (usuario.github.io/repo/arg-vs-mex): el slug es SIEMPRE el
    // último segmento y la base es todo lo anterior.
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var slug = parts.length ? parts[parts.length - 1] : '';
      var base = '/' + parts.slice(0, -1).join('/');
      if (base !== '/') base += '/';
      // Si no hay slug o parece un archivo (tiene punto), al inicio.
      // location.replace no deja historial: evita bucles con "Atrás" en TVs.
      if (!slug || slug.indexOf('.') !== -1) {
        location.replace(base);
      } else {
        location.replace(base + 'reproductor.html?slug=' + encodeURIComponent(slug));
      }
    })();
  </script>
</head>
<body style="background:#020617;color:#94a3b8;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <p>Cargando enlace…</p>
</body>
</html>
