<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando…</title>
  <script>
    // GitHub Pages sirve este 404.html cuando la ruta no existe como archivo.
    // Ej: el usuario escribe  https://ujose6018-pixel.github.io/tv2/mar-vs-arg
    // Extraemos el slug ("mar-vs-arg") y lo abrimos en el REPRODUCTOR aislado.
    (function () {
      var parts = location.pathname.split('/').filter(Boolean); // ['tv2', 'mar-vs-arg']
      var repo = parts[0] || '';                                // 'tv2'
      var slug = parts.slice(1).join('-');                      // 'mar-vs-arg'
      var base = repo ? '/' + repo + '/' : '/';
      if (slug) {
        location.replace(base + 'reproductor.html?slug=' + encodeURIComponent(slug));
      } else {
        location.replace(base);
      }
    })();
  </script>
</head>
<body style="background:#020617;color:#94a3b8;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <p>Cargando enlace…</p>
</body>
</html>
