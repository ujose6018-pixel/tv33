<html lang="es">
<head>

  <!-- Aplicar el tema guardado antes de pintar (evita parpadeo) -->
  <script>try{if(localStorage.getItem('topfut-theme')==='dark')document.documentElement.classList.add('theme-dark');}catch(e){}</script>

  <!-- Si llega un enlace de partido, mandarlo al reproductor aislado (antes de cargar nada) -->
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('slug') || p.get('s1') || p.get('s2') || p.get('linkId')) {
        location.replace('reproductor.html' + location.search);
      }
    })();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAp1IAukg9FGiOHGsRvvapN6QYzLOYDrOY",
      authDomain: "tvmundial-b190a.firebaseapp.com",
      projectId: "tvmundial-b190a",
      storageBucket: "tvmundial-b190a.firebasestorage.app",
      messagingSenderId: "324034223779",
      appId: "1:324034223779:web:49e679e822c4ae99762916"
    };
    const app = initializeApp(firebaseConfig);
    getFirestore(app);

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      color: #fff; min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -8%, #1b2a8f 0%, #0c1560 42%, #060a2e 100%) fixed, #060a2e;
    }
    .hidden { display: none !important; }
    a { text-decoration: none; color: inherit; }

    /* ── Navbar (negro + verde, identidad TOP FUT) ── */
    .navbar { position: sticky; top: 0; z-index: 40; background: linear-gradient(180deg, #131316 0%, #060607 100%); border-bottom: 2px solid #84cc16; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .navbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding: 0 18px; height: 60px; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; letter-spacing: .5px; font-style: italic; }
    .brand img { width: 36px; height: 36px; object-fit: contain; border-radius: 9px; }
    .brand .b1 { color: #fff; } .brand .b2 { color: #a3e635; }
    .nav-links { display: flex; gap: 6px; margin-left: 14px; flex: 1; }
    .nav-link { padding: 20px 14px; font-weight: 800; font-size: 14px; letter-spacing: .5px; color: #9aa3b2; cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: #fff; border-bottom-color: #a3e635; }
    .nav-icons { display: flex; align-items: center; gap: 4px; }
    .icon-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: transparent; border: none; color: #dfe4ff; cursor: pointer; }
    .icon-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .icon-btn svg { width: 20px; height: 20px; }
    .search-box { display: none; }
    .search-box.open { display: flex; }
    .search-box input { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 999px; padding: 8px 14px; outline: none; width: 180px; }
    .search-box input::placeholder { color: #c7cffc; }

    /* ── Hero ── */
    .hero { max-width: 1200px; margin: 18px auto 0; padding: 0 18px; }
    .hero-inner {
      position: relative; overflow: hidden; border-radius: 18px; padding: 26px 28px;
      background: linear-gradient(120deg, #16267e 0%, #21379e 60%, #16267e 100%);
      background-image:
        repeating-linear-gradient(120deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 24px),
        radial-gradient(rgba(255,255,255,0.10) 1px, transparent 1.6px),
        linear-gradient(120deg, #16267e 0%, #21379e 60%, #16267e 100%);
      background-size: auto, 24px 24px, auto;
      display: flex; align-items: center; gap: 20px;
    }
    .hero-inner img { width: 74px; height: 74px; object-fit: contain; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .hero h2 { margin: 0; font-size: 26px; font-weight: 900; }
    .hero p { margin: 4px 0 0; color: #bcc7f7; font-weight: 600; }
    .hero-live { flex-shrink: 0; display: inline-flex; align-items: center; gap: 7px; background: rgba(255,59,70,0.16); border: 1px solid rgba(255,89,100,0.5); color: #ffb3b8; font-weight: 800; font-size: 14px; padding: 8px 16px; border-radius: 999px; }
    .hl-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff3b46; animation: blink 1.1s infinite; }
    @media (max-width: 640px) { .hero-live { font-size: 12.5px; padding: 6px 12px; } }

    /* ── Sección ── */
    .section { max-width: 1200px; margin: 26px auto 0; padding: 0 18px; }
    .section-title { font-size: 22px; font-weight: 900; margin: 0 0 14px; }
    .scroll-wrap { position: relative; }
    /* Rejilla responsiva (se acomoda sola). Reemplaza al carrusel horizontal:
       más natural en móvil y TV, y sin JS de flechas. */
    .scroller { display: block; padding: 4px 0 14px; }
    .scroll-arrow { display: none; }   /* ya no se usan con la rejilla */

    /* Agrupación por día */
    .day-group { margin-bottom: 8px; }
    .day-title { font-size: 14px; font-weight: 800; color: #9fb0e6; margin: 14px 2px 12px; text-transform: uppercase; letter-spacing: .6px; }
    .day-title .n { color: #a3e635; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(258px, 1fr)); gap: 16px; }

    /* Skeletons de carga (pulso de opacidad barato, apto para TV) */
    @keyframes skelPulse { 0%,100% { opacity: .55; } 50% { opacity: .85; } }
    .skel-card { border-radius: 16px; overflow: hidden; background: #141a12; }
    .skel-card > div { animation: skelPulse 1.4s ease-in-out infinite; }
    .skel-top { height: 150px; background: rgba(255,255,255,0.06); }
    .skel-meta { padding: 14px; }
    .skel-line { height: 12px; border-radius: 6px; background: rgba(255,255,255,0.08); margin-bottom: 8px; }
    .skel-line.short { width: 55%; }
    .skel-btn { height: 38px; border-radius: 12px; background: rgba(255,255,255,0.08); margin-top: 12px; }
    @media (prefers-reduced-motion: reduce) { .skel-card > div { animation: none; } }

    /* ── Tarjeta de evento ── */
    .event-card { position: relative; width: 100%; max-width: 340px; transition: transform .2s; border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.28); }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 14px 34px rgba(0,0,0,0.4); }
    .event-card.locked { opacity: 0.72; }
    .event-card.locked:hover { transform: none; }
    .event-card.is-live { box-shadow: 0 0 0 2px rgba(255,59,70,0.55), 0 8px 26px rgba(255,59,70,0.22); }
    .event-top {
      position: relative; border-radius: 16px 16px 0 0; padding: 16px 14px 18px; overflow: hidden;
      background-color: #141a12;
      background-image:
        repeating-linear-gradient(120deg, rgba(163,230,53,0.07) 0 2px, transparent 2px 26px),
        radial-gradient(rgba(255,255,255,0.10) 1px, transparent 1.5px);
      background-size: auto, 22px 22px;
    }
    .comp-title { text-align: center; color: #fff; font-weight: 800; font-style: italic; font-size: 15px; text-shadow: 0 2px 6px rgba(0,0,0,0.4); margin-bottom: 12px; min-height: 20px; line-height: 1.1; }
    .crest-panel { position: relative; background: rgba(255,255,255,0.95); border-radius: 12px; padding: 20px 10px 12px; margin-top: 8px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }
    .round-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); white-space: nowrap; background: linear-gradient(180deg,#a3e635,#65a30d); color: #0c1502; font-weight: 900; font-size: 11px; letter-spacing: .4px; padding: 5px 14px; border-radius: 999px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-transform: uppercase; }
    .round-badge.live { background: linear-gradient(180deg,#ff3b46,#d61120); color: #fff; }
    .crests { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .crest { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .crest img { width: 62px; height: 62px; border-radius: 50%; object-fit: cover; background: #eef; box-shadow: 0 3px 8px rgba(0,0,0,0.25); }
    .crest .noimg { width: 62px; height: 62px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; background: #dbe3ff; }
    .crest .code { color: #10225f; font-weight: 900; font-size: 16px; letter-spacing: .5px; }
    .vs { color: #10225f; font-weight: 900; font-size: 18px; }
    /* Chips de filtro por deporte (solo aparecen si hay más de un deporte agendado) */
    .empty-cta { display: inline-block; margin-top: 14px; background: #a3e635; color: #0c1502; font-weight: 800; font-size: 14px; padding: 11px 22px; border-radius: 999px; text-decoration: none; transition: transform .15s, box-shadow .15s; }
    .empty-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(163,230,53,0.35); }
    .sport-chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 14px; }
    .sport-chips:empty { margin: 0; }
    .sport-chip { border: 1px solid rgba(163,230,53,0.25); background: rgba(255,255,255,0.05); color: #cdd6f4; font-weight: 700; font-size: 12.5px; padding: 7px 14px; border-radius: 999px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
    .sport-chip:hover { border-color: rgba(163,230,53,0.6); }
    .sport-chip.active { background: #a3e635; border-color: #a3e635; color: #0c1502; }
    .event-meta { background: rgba(9,14,52,0.72); border-radius: 0 0 16px 16px; padding: 12px 14px; }
    .event-name { font-weight: 800; font-size: 15px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-time { color: #9fb0e6; font-size: 12.5px; margin-top: 3px; font-variant-numeric: tabular-nums; }
    .event-time .cd { color: #a3e635; font-weight: 700; }
    .event-time .live { color: #ff5964; font-weight: 800; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.35;} }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ff3b46; margin-right: 4px; animation: blink 1.1s infinite; }
    /* Botones de señal (el cliente elige Señal 1 / 2) */
    .event-actions { display: flex; gap: 8px; margin-top: 12px; }
    .sig-btn { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none; cursor: pointer; border-radius: 12px; padding: 10px 6px; font-weight: 800; font-size: 13px; color: #0c1502; background: linear-gradient(135deg,#a3e635,#65a30d); transition: transform .15s, box-shadow .15s; }
    .sig-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(132,204,22,0.35); }
    .sig-btn.alt { background: linear-gradient(135deg,#e2e8f0,#94a3b8); color:#0f172a; }
    .sig-btn.alt2 { background: #1a2413; color: #a3e635; border: 1px solid rgba(163,230,53,0.6); }
    .event-actions.three .sig-btn { font-size: 11.5px; padding: 10px 4px; letter-spacing: -0.2px; }
    .locked-btn { flex: 1; text-align: center; border-radius: 12px; padding: 10px 8px; font-weight: 800; font-size: 13px; color: #94a3b8; background: rgba(148,163,184,0.12); margin-top: 12px; }

    /* Botón compartir (esquina de la tarjeta) */
    .card-share { position: absolute; top: 8px; right: 8px; z-index: 3; width: 32px; height: 32px; border: none; cursor: pointer; border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff; display: flex; align-items: center; justify-content: center; padding: 0; }
    .card-share:hover { background: #65a30d; color: #0c1502; }
    .card-share svg { width: 16px; height: 16px; }

    /* Marcador de resultado (finalizados) */
    .event-time .score { color: #e2e8f0; font-weight: 800; }
    .event-time .fin { color: #94a3b8; font-weight: 700; }

    /* Toast */
    #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); z-index: 70; background: rgba(15,23,42,0.96); color: #fff; padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.5); opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 90%; text-align: center; }
    #toast.show { opacity: 1; }
    @media (prefers-reduced-motion: reduce) { #toast { transition: none; } .event-card { transition: none; } }

    /* Foco visible para navegar con el control de la TV */
    .nav-link:focus-visible, .icon-btn:focus-visible, .sig-btn:focus-visible,
    .card-share:focus-visible, .search-box input:focus-visible, #install-btn:focus-visible,
    footer a:focus-visible, .modal-close:focus-visible {
      outline: 3px solid #a3e635; outline-offset: 2px;
    }
    .sig-btn:focus-visible { scroll-margin-top: 84px; scroll-margin-bottom: 24px; }

    .empty { text-align: center; color: #9fb0e6; padding: 60px 0; width: 100%; }
    footer { max-width: 1200px; margin: 40px auto 0; padding: 24px 18px; color: #6b78ba; font-size: 12px; text-align: center; }

    /* ── Responsive (móvil / Smart TV angosta) ── */
    @media (max-width: 640px) {
      /* Nav en 2 filas: arriba marca + iconos, abajo pestañas deslizables */
      .navbar-inner { flex-wrap: wrap; height: auto; gap: 4px 8px; padding: 8px 10px 0; }
      .brand { font-size: 16px; gap: 7px; }
      .brand img { width: 28px; height: 28px; }
      .nav-icons { margin-left: auto; }
      .nav-links {
        order: 3; flex-basis: 100%; margin: 2px 0 0; gap: 2px;
        overflow-x: auto; flex-wrap: nowrap; white-space: nowrap;
        -webkit-overflow-scrolling: touch; scrollbar-width: none;
      }
      .nav-links::-webkit-scrollbar { display: none; }
      .nav-link { flex: none; padding: 10px 13px; font-size: 12.5px; letter-spacing: .2px; }
      .icon-btn { width: 34px; height: 34px; }
      .search-box input { width: 116px; }
      .hero-inner { padding: 18px; gap: 14px; }
      .hero-inner img { width: 56px; height: 56px; }
      .hero h2 { font-size: 19px; }
      .section-title { font-size: 19px; }
      .event-card { flex-basis: 270px; max-width: 270px; }
    }

    /* ── Tema DARK (el "Original" es el azul por defecto) ── */
    .theme-dark body { background: radial-gradient(1200px 600px at 50% -8%, #1c1f16 0%, #101210 45%, #070708 100%) fixed, #070708; }
    .theme-dark .nav-link.active { border-bottom-color: #a3e635; }
    .theme-dark .hero-inner {
      background-color: #1c2029;
      background-image:
        repeating-linear-gradient(120deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 24px),
        radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1.6px),
        linear-gradient(120deg, #1c1f28, #2a2e3a 60%, #1c1f28);
    }
    .theme-dark .event-top {
      background-color: #1c2029;
      background-image:
        repeating-linear-gradient(120deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 26px),
        radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1.5px);
    }
    .theme-dark .event-meta { background: rgba(0,0,0,0.72); }
    .theme-dark .scroll-arrow { background: rgba(18,19,25,0.9); }
    .theme-dark .scroll-arrow:hover { background: #33363f; }

    /* ── Botón instalar ── */
    #install-btn { display: none; align-items: center; gap: 6px; background: linear-gradient(180deg,#a3e635,#65a30d); color: #0c1502; font-weight: 800; font-size: 12.5px; border: none; border-radius: 999px; padding: 8px 14px; cursor: pointer; }
    #install-btn.show { display: inline-flex; }

    /* ── Modal legal ── */
    .modal { position: fixed; inset: 0; z-index: 60; background: rgba(2,6,23,0.8); display: none; align-items: center; justify-content: center; padding: 18px; }
    .modal.open { display: flex; }
    .modal-card { background: #0f1633; border: 1px solid rgba(120,140,255,0.25); border-radius: 18px; max-width: 560px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 24px; }
    .theme-dark .modal-card { background: #16181f; border-color: rgba(255,255,255,0.12); }
    .modal-card h3 { margin: 0 0 4px; font-size: 20px; }
    .modal-card h4 { margin: 18px 0 6px; font-size: 15px; color: #a3e635; }
    .modal-card p { margin: 0 0 10px; color: #c7cffc; font-size: 13.5px; line-height: 1.55; }
    .theme-dark .modal-card p { color: #b8bcc6; }
    .modal-close { margin-top: 16px; width: 100%; background: linear-gradient(180deg,#a3e635,#65a30d); color: #0c1502; font-weight: 800; border: none; border-radius: 12px; padding: 12px; cursor: pointer; }
    footer a { color: #9fb0e6; text-decoration: underline; cursor: pointer; }
    footer .sep { margin: 0 8px; opacity: .5; }
  </style>
</head>

        <a class="nav-link" href="juegos.html" style="text-decoration:none;display:inline-block;">🎮 JUEGOS</a>

      </div>

      TOP FUT no aloja ni retransmite contenido. Solo enlaza fuentes de terceros.
    </p>

  <!-- ── Modal legal ── -->
  <div class="modal" id="legal-modal">
    <div class="modal-card">
      <div id="legal-content"></div>
      <button class="modal-close" id="legal-close">Entendido</button>
    </div>

  <script type="module">
    import { getFirestore, collection, getDocs, getDoc, doc, onSnapshot, setDoc, increment } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', () => {
      const db = getFirestore();
      const matchesCol = collection(db, "matches");

      // ── Analítica de visitas (fire-and-forget, NO lee nada; 1 por día por dispositivo).
      //    Solo escribe contadores con increment() en public/stats. El panel los lee/grafica. ──
      (function trackVisit() {
        try {
          const today = new Date().toISOString().slice(0, 10);
          const key = 'topfut-visit-' + today;
          if (localStorage.getItem(key)) return;   // ya contado hoy en este dispositivo
          localStorage.setItem(key, '1');
          setDoc(doc(db, 'public', 'stats'), {
            visitsTotal: increment(1),
            daily: { [today]: { visits: increment(1) } },
            updatedAt: Date.now()
          }, { merge: true }).catch(() => {});
        } catch (e) {}
      })();

      const $ = id => document.getElementById(id);
      // URL limpia: si se llegó como /index.html, dejar solo la carpeta en la barra
      try {
        if (/\/index\.html$/.test(location.pathname)) {
          history.replaceState(null, '', location.pathname.replace(/index\.html$/, '') + location.search);
        }
      } catch (_) {}
      const scroller = $('scroller');
      const sectionTitle = $('section-title');

      const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const abbr = (name) => ((name || '').normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^A-Za-z0-9]/g, '').slice(0, 3).toUpperCase() || '—');

      // ── Deportes / tipos de evento ──
      const SPORTS = {
        futbol:  { emoji: '⚽',  label: 'Fútbol' },
        ufc:     { emoji: '🥋', label: 'UFC / MMA' },
        boxeo:   { emoji: '🥊', label: 'Boxeo' },
        lucha:   { emoji: '🤼', label: 'Lucha libre' },
        basquet: { emoji: '🏀', label: 'Básquet' },
        beisbol: { emoji: '⚾',  label: 'Béisbol' },
        tenis:   { emoji: '🎾', label: 'Tenis' },
        motor:   { emoji: '🏎️', label: 'Automovilismo' },
        otro:    { emoji: '🏆', label: 'Eventos' }
      };
      const sportOf = (m) => SPORTS[m.sport] ? m.sport : 'futbol';
      const sportEmoji = (m) => SPORTS[sportOf(m)].emoji;
      const dt = (m) => {
        if (!m.kickoff?.seconds) return '';
        const d = new Date(m.kickoff.seconds * 1000);
        const p = n => String(n).padStart(2, '0');
        return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
      };

      // ── Cuenta regresiva / activación por horario ──
      const LINK_ACTIVE_MIN = 30;  // el enlace se activa 30 min antes del inicio
      const AUTO_PLAY_MIN = 10;    // se considera "en vivo" (auto-arranque) 10 min antes
      const koMillis = (m) => (m.kickoff?.seconds ? m.kickoff.seconds * 1000 : null);
      function formatCountdown(ms) {
        if (ms <= 0) return '00:00:00';
        let s = Math.floor(ms / 1000);
        const d = Math.floor(s / 86400); s -= d * 86400;
        const h = Math.floor(s / 3600); s -= h * 3600;
        const mm = Math.floor(s / 60); s -= mm * 60;
        const p = n => String(n).padStart(2, '0');
        return (d > 0 ? d + 'd ' : '') + p(h) + ':' + p(mm) + ':' + p(s);
      }
      function computePhase(m) {
        if (m.status === 'finished') return 'finished';
        if (m.status === 'live') return 'live';
        const ko = koMillis(m);
        if (ko == null) return 'active';
        const now = Date.now();
        if (now >= ko - AUTO_PLAY_MIN * 60000) return 'live';
        if (now >= ko - LINK_ACTIVE_MIN * 60000) return 'active';
        return 'locked';
      }

      // ── Helpers añadidos: URL corta, toast, agrupación por día, compartir ──
      const getBaseDir = () => { const p = location.pathname; return p.substring(0, p.lastIndexOf('/') + 1); };
      const shortUrlFor = (slug) => location.origin + getBaseDir() + slug;
      let toastTimer = null;
      const toast = (msg) => {
        const t = $('toast'); t.textContent = msg; t.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
      };
      const dayKey = (m) => {
        const ko = koMillis(m); if (!ko) return 'zzz-sin-fecha';
        const d = new Date(ko);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };
      const dayLabel = (m) => {
        const ko = koMillis(m); if (!ko) return '🗓️ Sin fecha';
        const d = new Date(ko), today = new Date(), tom = new Date();
        tom.setDate(today.getDate() + 1);
        const same = (a, b) => a.getDate() === b.getDate() && a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear();
        if (same(d, today)) return 'HOY';
        if (same(d, tom)) return 'MAÑANA';
        return new Intl.DateTimeFormat('es-ES', { weekday: 'long', day: '2-digit', month: 'long' }).format(d).toUpperCase();
      };
      // Compartir: usa el diálogo nativo si existe; si no, copia el enlace (toast) o WhatsApp.
      window.shareMatch = (slug) => {
        const m = allMatches.find(x => x.slug === slug);
        const name = m ? ([m.home, m.away].filter(Boolean).join(' vs ') || m.title || 'Evento') : 'Evento';
        const url = shortUrlFor(slug);
        const text = (m ? sportEmoji(m) : '⚽') + ' ' + name + '\n' + url;
        if (navigator.share) { navigator.share({ title: name, text, url }).catch(() => {}); }
        else if (navigator.clipboard) { navigator.clipboard.writeText(url).then(() => toast('🔗 Enlace copiado')).catch(() => window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank')); }
        else { window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank'); }
      };

      let allMatches = [];
      let currentFilter = 'all';
      let searchQuery = '';
      let visibleList = [];
      let phaseCache = {};

      window.goMatch = (slug, sIdx) => {
        const s = (sIdx == null) ? '' : '&s=' + sIdx;
        window.location.href = 'reproductor.html?slug=' + encodeURIComponent(slug) + s;
      };

      function crest(name, logo, emoji) {
        const emo = emoji || '⚽';
        return `<div class="crest">
          ${logo ? `<img src="${esc(logo)}" alt="" onerror="this.outerHTML='<div class=&quot;noimg&quot;>${emo}</div>'">` : `<div class="noimg">${emo}</div>`}
          <span class="code">${esc(abbr(name))}</span>
        </div>`;
      }

      function matchCard(m) {
        const phase = computePhase(m);
        const ko = koMillis(m);
        const now = Date.now();

        let badge = '';
        if (phase === 'live') badge = `<div class="round-badge live">● EN VIVO</div>`;
        else if (phase === 'finished') badge = `<div class="round-badge" style="background:linear-gradient(180deg,#cbd5e1,#94a3b8);color:#0f172a;">FINAL</div>`;
        else if (m.round) badge = `<div class="round-badge">${esc(m.round)}</div>`;

        const key = esc(m.slug || '');
        let timeLine;
        if (phase === 'finished') {
          const fs = m.finalScore;
          const sc = (fs && fs.home != null && fs.away != null && fs.home !== '' && fs.away !== '')
            ? `${esc(String(fs.home))} - ${esc(String(fs.away))}`
            : (m.finalResultText ? esc(m.finalResultText) : '');
          timeLine = (sc ? `<span class="score">${sc}</span> · ` : '') + `<span class="fin">🏁 Finalizado</span>`;
        } else if (phase === 'live') {
          timeLine = `<span class="live"><span class="dot"></span>EN VIVO AHORA</span>`;
        } else if (phase === 'locked') {
          timeLine = `${esc(dt(m))} · 🔒 <span class="cd" id="cd-${key}" data-ko="${ko}">${formatCountdown(ko - now)}</span>`;
        } else {
          timeLine = `${esc(dt(m))}${ko ? ` · ⏱ <span class="cd" id="cd-${key}" data-ko="${ko}">${formatCountdown(ko - now)}</span>` : ''}`;
        }

        const clickable = phase !== 'locked';
        const emo = sportEmoji(m);
        const isSingle = !(m.home && m.away);   // evento completo (WWE RAW, gala UFC, GP…) → sin "VS"
        const name = [m.home, m.away].filter(Boolean).join(' vs. ') || (m.title || 'Evento');
        const sigs = m.signals || [];
        let actions;
        if (phase === 'finished') {
          actions = `<div class="event-actions"><button class="sig-btn alt" onclick="goMatch('${key}')">📊 Ver resumen</button></div>`;
        } else if (!clickable) {
          actions = `<div class="locked-btn">🔒 Disponible pronto</div>`;
        } else if (sigs.length >= 2) {
          // Un botón por señal (hasta 3); el cliente elige y el reproductor abre esa (?s=i)
          const cls = ['', ' alt', ' alt2'];
          const shown = sigs.slice(0, 3);
          actions = `<div class="event-actions${shown.length === 3 ? ' three' : ''}">` + shown.map((s, i) =>
            `<button class="sig-btn${cls[i]}" onclick="goMatch('${key}',${i})">▶️ ${esc(s.name || ('Señal ' + (i + 1)))}</button>`
          ).join('') + `</div>`;
        } else {
          actions = `<div class="event-actions"><button class="sig-btn" onclick="goMatch('${key}',0)">▶️ Ver ahora</button></div>`;
        }
        return `
          <div class="event-card ${clickable ? '' : 'locked'}${phase === 'live' ? ' is-live' : ''}">
            <button class="card-share" title="Compartir" aria-label="Compartir" onclick="shareMatch('${key}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
            </button>
            <div class="event-top">
              <div class="comp-title">${esc(m.competition || (SPORTS[sportOf(m)].label !== 'Fútbol' ? SPORTS[sportOf(m)].label : 'TOP FUT'))}</div>
              <div class="crest-panel">
                ${badge}
                <div class="crests">
                  ${isSingle
                    ? crest(m.home || m.away || m.title, m.homeLogo || m.awayLogo, emo)
                    : `${crest(m.home, m.homeLogo, emo)}
                  <span class="vs">VS</span>
                  ${crest(m.away, m.awayLogo, emo)}`}
                </div>
              </div>
            </div>
            <div class="event-meta">
              <p class="event-name">${esc(name)}</p>
              <div class="event-time">${timeLine}</div>
              ${actions}
            </div>
          </div>`;
      }

      function passesSearch(m) {
        if (!searchQuery) return true;
        return `${m.home || ''} ${m.away || ''} ${m.competition || ''} ${m.title || ''} ${SPORTS[sportOf(m)].label}`.toLowerCase().includes(searchQuery);
      }

      // ── Filtro por deporte (chips): solo se muestran si hay más de un deporte agendado ──
      let sportFilter = 'all';
      window.setSportFilter = (s) => { sportFilter = s; renderGrid(); };
      function renderSportChips() {
        const cont = $('sport-chips');
        const present = [...new Set(allMatches.map(sportOf))];
        if (present.length <= 1) { if (sportFilter !== 'all') sportFilter = 'all'; cont.innerHTML = ''; return; }
        if (sportFilter !== 'all' && !present.includes(sportFilter)) sportFilter = 'all';
        const chip = (key, label) => `<button class="sport-chip ${sportFilter === key ? 'active' : ''}" onclick="setSportFilter('${key}')">${label}</button>`;
        cont.innerHTML = chip('all', '🌐 Todos')
          + Object.keys(SPORTS).filter(k => present.includes(k))
              .map(k => chip(k, `${SPORTS[k].emoji} ${SPORTS[k].label}`)).join('');
      }

      function renderGrid() {
        renderSportChips();
        // Contador de eventos en vivo (badge del hero)
        const liveCount = allMatches.filter(m => computePhase(m) === 'live').length;
        const heroLive = document.getElementById('hero-live');
        if (heroLive) {
          heroLive.classList.toggle('hidden', liveCount === 0);
          const n = document.getElementById('hero-live-n');
          if (n) n.textContent = liveCount;
        }
        let list = allMatches.filter(passesSearch);
        if (sportFilter !== 'all') list = list.filter(m => sportOf(m) === sportFilter);
        const isFinished = currentFilter === 'finished';
        if (currentFilter === 'live') list = list.filter(m => computePhase(m) === 'live');
        else if (currentFilter === 'upcoming') list = list.filter(m => { const p = computePhase(m); return p === 'active' || p === 'locked'; });
        else if (isFinished) list = list.filter(m => computePhase(m) === 'finished');
        else list = list.filter(m => computePhase(m) !== 'finished');

        if (isFinished) {
          list.sort((a, b) => (koMillis(b) || 0) - (koMillis(a) || 0));   // más recientes primero
        } else {
          list.sort((a, b) => {
            const la = computePhase(a) === 'live' ? 0 : 1, lb = computePhase(b) === 'live' ? 0 : 1;
            if (la !== lb) return la - lb;
            return (koMillis(a) || 0) - (koMillis(b) || 0);
          });
        }

        visibleList = list;
        phaseCache = {};
        list.forEach(m => phaseCache[m.slug] = computePhase(m));

        sectionTitle.textContent = currentFilter === 'live' ? '🔴 En vivo'
          : currentFilter === 'upcoming' ? 'Próximos eventos'
          : isFinished ? '🏁 Resultados' : 'Eventos';

        if (list.length === 0) {
          scroller.innerHTML = `<div class="empty">📭 No hay eventos ${currentFilter === 'live' ? 'en vivo' : currentFilter === 'upcoming' ? 'próximos' : isFinished ? 'finalizados' : 'disponibles'} por ahora<br><a href="juegos.html" class="empty-cta">🎮 Jugar minijuegos mientras esperas</a></div>`;
          return;
        }

        // Agrupar por día (conserva el orden ya calculado)
        const order = [], byKey = {};
        for (const m of list) {
          const k = dayKey(m);
          if (!byKey[k]) { byKey[k] = { label: dayLabel(m), items: [] }; order.push(k); }
          byKey[k].items.push(m);
        }
        scroller.innerHTML = order.map(k => `
          <div class="day-group">
            <div class="day-title"><span class="n">▸</span> ${esc(byKey[k].label)}</div>
            <div class="grid">${byKey[k].items.map(matchCard).join('')}</div>
          </div>`).join('');
      }

      // Skeletons mientras carga (pulso ligero)
      function renderSkeletons(n) {
        const card = `<div class="skel-card"><div class="skel-top"></div><div class="skel-meta"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-btn"></div></div></div>`;
        scroller.innerHTML = `<div class="day-group"><div class="grid">${card.repeat(n || 6)}</div></div>`;
      }

      // Navegación (filtros)
      document.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', () => {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        currentFilter = link.dataset.filter;
        renderGrid();
      }));

      // Buscador
      $('search-btn').addEventListener('click', () => {
        const box = $('search-box');
        box.classList.toggle('open');
        if (box.classList.contains('open')) $('search-input').focus();
        else { $('search-input').value = ''; searchQuery = ''; renderGrid(); }
      });
      $('search-input').addEventListener('input', (e) => { searchQuery = e.target.value.trim().toLowerCase(); renderGrid(); });

      // Flechas de scroll
      $('arrow-left').addEventListener('click', () => scroller.scrollBy({ left: -330, behavior: 'smooth' }));
      $('arrow-right').addEventListener('click', () => scroller.scrollBy({ left: 330, behavior: 'smooth' }));

      // ── Datos: escuchamos EN VIVO el único documento agregado (public/schedule).
      //     Es un solo doc (no toda la colección), así que sigue siendo ligerísimo,
      //     pero ahora los cambios del panel (crear/editar partido, señales, estado)
      //     aparecen al instante SIN refrescar la página. Si el agregado aún no
      //     existe, caemos a la colección una sola vez (primer arranque). ──
      async function loadFromCollectionOnce() {
        try {
          const qs = await getDocs(matchesCol);
          allMatches = qs.docs.map(d => ({ id: d.id, ...d.data() }));
          renderGrid();
        } catch (e) { console.error('fallback matches', e); }
      }
      renderSkeletons(8);   // placeholder mientras llega el primer snapshot
      onSnapshot(doc(db, 'public', 'schedule'), (snap) => {
        if (snap.exists() && Array.isArray(snap.data().matches)) {
          allMatches = snap.data().matches;
          renderGrid();
        } else {
          loadFromCollectionOnce();
        }
      }, (e) => { console.error('schedule onSnapshot', e); loadFromCollectionOnce(); });

      // Temporizador: actualiza cuentas regresivas cada segundo; re-renderiza al cambiar de fase
      setInterval(() => {
        for (const m of visibleList) {
          if (computePhase(m) !== phaseCache[m.slug]) { renderGrid(); return; }
        }
        for (const m of visibleList) {
          const el = document.getElementById('cd-' + (m.slug || ''));
          if (el) el.textContent = formatCountdown(Number(el.dataset.ko) - Date.now());
        }
      }, 1000);

      // ── Tema (Original / Dark) ──
      const themeIcon = () => {
        const dark = document.documentElement.classList.contains('theme-dark');
        $('theme-icon').innerHTML = dark
          ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>'
          : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      };
      themeIcon();
      $('theme-btn').addEventListener('click', () => {
        const dark = document.documentElement.classList.toggle('theme-dark');
        try { localStorage.setItem('topfut-theme', dark ? 'dark' : 'original'); } catch (e) {}
        themeIcon();
      });

      // ── Modal legal ──
      const LEGAL = {
        terms: `<h3>Términos y condiciones</h3>
          <p>TOP FUT es únicamente un <b>agregador de enlaces</b>. No alojamos, subimos, grabamos ni retransmitimos ningún contenido de audio o video.</p>
          <p>Todos los enlaces provienen de <b>fuentes de terceros</b>, alojadas y transmitidas por dichos terceros, quienes son los únicos responsables de su contenido, legalidad y disponibilidad.</p>
          <p>Si eres titular de derechos y consideras que un enlace infringe los tuyos, dirígete al proveedor de origen que aloja el contenido. El uso de esta plataforma implica la aceptación de estos términos.</p>`,
        privacy: `<h3>Política de privacidad</h3>
          <p>TOP FUT <b>no solicita ni almacena datos personales ni sensibles</b> de los usuarios: sin registro, sin nombres, correos, contraseñas ni datos de pago.</p>
          <p>La plataforma solo almacena <b>enlaces de terceros</b> y la <b>programación de partidos</b> (equipos y horarios).</p>
          <p>Tus preferencias (como el tema) se guardan localmente en tu dispositivo y nunca se envían a ningún servidor.</p>`
      };
      const legalModal = $('legal-modal');
      const openLegal = (k) => { $('legal-content').innerHTML = LEGAL[k]; legalModal.classList.add('open'); };
      $('link-terms').addEventListener('click', () => openLegal('terms'));
      $('link-privacy').addEventListener('click', () => openLegal('privacy'));
      $('legal-close').addEventListener('click', () => legalModal.classList.remove('open'));
      legalModal.addEventListener('click', (e) => { if (e.target === legalModal) legalModal.classList.remove('open'); });

      // ── PWA (instalable, solo la interfaz de cliente) ──
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
      let deferredPrompt = null;
      const installBtn = $('install-btn');
      window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.classList.add('show'); });
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null; installBtn.classList.remove('show');
      });
      window.addEventListener('appinstalled', () => installBtn.classList.remove('show'));
    });
  </script>
</body>
</html>
