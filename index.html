<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Mundial 2026 - Fútbol en Vivo</title>

  <script src="https://cdn.tailwindcss.com"></script>

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAp1IAukg9FGiOHGsRvvapN6QYzLOYDrOY",
      authDomain: "tvmundial-b190a.firebaseapp.com",
      projectId: "tvmundial-b190a",
      storageBucket: "tvmundial-b190a.firebasestorage.app",
      messagingSenderId: "324034223779",
      appId: "1:324034223779:web:49e679e822c4ae99762916"
    };
    const app = initializeApp(firebaseConfig);
    getFirestore(app);
  </script>
  <style>
    .hidden { display: none !important; }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    @keyframes gradient-shift { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
    @keyframes fade-in-up { 0%{opacity:0;transform:translateY(20px);} 100%{opacity:1;transform:translateY(0);} }
    @keyframes live-blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
    .float-animation { animation: float 3s ease-in-out infinite; }
    .fade-in-up { animation: fade-in-up 0.4s ease-out; }
    .live-dot { animation: live-blink 1.1s ease-in-out infinite; }
    .gradient-bg { background: linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b); background-size:400% 400%; animation: gradient-shift 20s ease infinite; }
    .btn-gold { background: linear-gradient(135deg,#f59e0b 0%,#fbbf24 50%,#fcd34d 100%); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .btn-gold:hover { background: linear-gradient(135deg,#d97706 0%,#f59e0b 50%,#fbbf24 100%); transform: translateY(-2px); box-shadow:0 15px 40px rgba(245,158,11,0.6); }
    .card-glow { box-shadow:0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(16px); }
    .match-card { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); cursor:pointer; }
    .match-card:hover { transform: translateY(-5px); box-shadow:0 24px 60px rgba(16,185,129,0.25); border-color: rgba(16,185,129,0.6); }
    .chip { transition: all 0.2s ease; }
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); border-radius:10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#10b981,#3b82f6); border-radius:10px; }
  </style>
</head>
<body class="gradient-bg text-white min-h-screen w-full font-sans selection:bg-emerald-500/50">

  <!-- ==========================================
       VISTA CLIENTE (Plataforma de partidos)
       ========================================== -->
  <div id="home-view" class="min-h-screen hidden">
    <header class="sticky top-0 z-30 bg-slate-950/80 backdrop-blur-xl border-b border-emerald-500/20">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center gap-3">
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-xl p-1 float-animation">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/2026_FIFA_World_Cup_emblem.svg/1920px-2026_FIFA_World_Cup_emblem.svg.png" alt="Mundial 2026" class="w-full h-full object-contain">
        </div>
        <div>
          <h1 class="text-xl sm:text-2xl font-black bg-gradient-to-r from-yellow-300 via-orange-400 to-yellow-500 bg-clip-text text-transparent leading-tight">TV MUNDIAL 2026</h1>
          <p class="text-emerald-300/80 text-xs font-semibold">⚽ Fútbol en vivo</p>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
      <div id="filter-chips" class="flex gap-2 mb-6 overflow-x-auto pb-1">
        <button data-filter="all" class="chip active shrink-0 px-5 py-2.5 rounded-full font-bold text-sm bg-gradient-to-r from-emerald-600 to-teal-600 text-white shadow-lg">📺 Todos</button>
        <button data-filter="live" class="chip shrink-0 px-5 py-2.5 rounded-full font-bold text-sm bg-slate-800/70 text-slate-300 hover:bg-slate-700">🔴 En vivo</button>
        <button data-filter="upcoming" class="chip shrink-0 px-5 py-2.5 rounded-full font-bold text-sm bg-slate-800/70 text-slate-300 hover:bg-slate-700">🕐 Próximos</button>
      </div>

      <div id="matches-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="col-span-full text-center text-slate-400 py-24">
          <div class="text-6xl mb-4 opacity-50">📡</div>
          <p class="text-lg">Cargando partidos…</p>
        </div>
      </div>
    </main>

    <footer class="max-w-6xl mx-auto px-4 py-8 text-center text-slate-500 text-xs">
      ⚽ TV Mundial 2026 · Transmisiones en vivo
    </footer>
  </div>

  <!-- ==========================================
       VISTA DEL VISOR (una sola señal)
       ========================================== -->
  <div id="viewer-view" class="fixed inset-0 bg-black flex-col overflow-hidden w-full h-full hidden">
    <a href="index.html" id="btn-home" class="absolute top-4 left-4 z-50 bg-black/80 hover:bg-black/95 text-white p-2.5 rounded-xl opacity-60 hover:opacity-90 transition-all backdrop-blur-xl shadow-lg flex items-center gap-2 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      <span class="hidden group-hover:inline font-bold text-xs pr-1">Inicio</span>
    </a>

    <button id="btn-fullscreen" class="absolute bottom-4 left-4 z-50 bg-black/80 hover:bg-black/95 text-white p-2.5 rounded-xl opacity-60 hover:opacity-90 transition-all backdrop-blur-xl shadow-lg flex items-center gap-2 group">
      <svg id="icon-fullscreen" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <span id="text-fullscreen" class="hidden group-hover:inline font-bold text-xs pr-1">Fullscreen</span>
    </button>

    <div id="video-container" class="w-full h-full"></div>
  </div>

  <!-- ==========================================
       OVERLAY DE PARTIDO (previo / finalizado)
       ========================================== -->
  <div id="match-overlay" class="fixed inset-0 z-40 bg-gradient-to-br from-slate-950 to-slate-900 hidden items-center justify-center p-6">
    <div class="text-center max-w-lg fade-in-up">
      <div id="mo-content"></div>
      <a href="index.html" class="inline-block mt-8 btn-gold text-slate-900 font-bold py-3 px-8 rounded-2xl shadow-lg">🏠 Ver otros partidos</a>
    </div>
  </div>

  <!-- ==========================================
       VISTA DE ENLACE EXPIRADO / NO DISPONIBLE
       ========================================== -->
  <div id="expired-view" class="fixed inset-0 bg-gradient-to-br from-red-900 to-slate-950 flex items-center justify-center hidden">
    <div class="text-center p-12 bg-slate-900/90 backdrop-blur-xl rounded-3xl border border-red-500/30 card-glow max-w-md">
      <div class="w-24 h-24 bg-gradient-to-br from-red-500 to-pink-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h2 class="text-4xl font-black text-red-400 mb-3">¡Enlace no disponible!</h2>
      <p class="text-slate-300 text-lg mb-8">Este enlace ha caducado o no existe</p>
      <a href="index.html" class="inline-block btn-gold text-slate-900 font-bold text-lg py-4 px-10 rounded-2xl shadow-lg">🏠 Volver al Inicio</a>
    </div>
  </div>

  <!-- ==========================================
       LÓGICA
       ========================================== -->
  <script type="module">
    import { getFirestore, collection, getDocs, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
      const db = getFirestore();
      const matchesCol = collection(db, "matches");
      const linksCol = collection(db, "generatedLinks");

      // ── Refs ──────────────────────────────────────────────────
      const homeView = document.getElementById('home-view');
      const viewerView = document.getElementById('viewer-view');
      const videoContainer = document.getElementById('video-container');
      const expiredView = document.getElementById('expired-view');
      const matchOverlay = document.getElementById('match-overlay');
      const moContent = document.getElementById('mo-content');
      const btnFullscreen = document.getElementById('btn-fullscreen');
      const matchesGrid = document.getElementById('matches-grid');
      const filterChips = document.getElementById('filter-chips');

      // ── Helpers ───────────────────────────────────────────────
      const safeDecode = (v) => { try { return decodeURIComponent(v); } catch (_) { return v; } };
      const getBaseDir = () => { const p = window.location.pathname; return p.substring(0, p.lastIndexOf('/') + 1); };
      const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const isToday = (d) => { const n = new Date(); return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear(); };
      const timeLabel = (m) => {
        if (!m.kickoff?.seconds) return '';
        const d = new Date(m.kickoff.seconds * 1000);
        const hm = new Intl.DateTimeFormat('es-ES', { hour:'2-digit', minute:'2-digit' }).format(d);
        return isToday(d) ? 'Hoy ' + hm : new Intl.DateTimeFormat('es-ES', { day:'2-digit', month:'2-digit' }).format(d) + ' ' + hm;
      };

      // Al entrar al visor: bloquear popups (ads de iframes)
      let viewerGuardsSet = false;
      const enterViewerGuards = () => { if (!viewerGuardsSet) { window.open = function () { return null; }; viewerGuardsSet = true; } };

      // ══════════════════════════════════════════════════════════
      //  REPRODUCTOR DE UNA SOLA SEÑAL
      // ══════════════════════════════════════════════════════════
      let _hlsReady = false, _hlsQ = [];
      function _ensureHLS(cb) {
        if (_hlsReady) { cb(); return; }
        _hlsQ.push(cb);
        if (!window._hlsLoading) {
          window._hlsLoading = true;
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
          s.onload = () => { _hlsReady = true; _hlsQ.forEach(f => f()); _hlsQ = []; };
          document.head.appendChild(s);
        }
      }

      function detectStreamType(url) {
        if (/youtube\.com|youtube-nocookie\.com|youtu\.be/.test(url)) return 'youtube';
        if (/twitch\.tv/.test(url)) return 'twitch';
        if (/\.(m3u8|m3u|mp4|ts|webm)(\?|$)/i.test(url)) return 'direct';
        return 'iframe';
      }

      function mountSingle(url) {
        videoContainer.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'relative w-full h-full';
        const type = detectStreamType(url);

        if (type === 'youtube') {
          let embed = url
            .replace(/youtube\.com\/watch\?v=([^&]+)/, 'youtube.com/embed/$1')
            .replace(/youtu\.be\/([^?]+)/, 'youtube.com/embed/$1')
            .replace(/youtube-nocookie\.com\/watch\?v=([^&]+)/, 'youtube-nocookie.com/embed/$1');
          embed += (embed.includes('?') ? '&' : '?') + 'autoplay=1&playsinline=1';
          wrap.innerHTML = `<iframe src="${esc(embed)}" class="absolute inset-0 w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;

        } else if (type === 'twitch') {
          let channel = '', video = '';
          try {
            const u = new URL(url.startsWith('http') ? url : 'https://' + url);
            const vP = u.searchParams.get('video'), chP = u.searchParams.get('channel');
            const pp = u.pathname.split('/').filter(Boolean);
            if (vP) video = vP;
            else if (chP) channel = chP;
            else if (pp[0] === 'videos' && pp[1]) video = pp[1];
            else if (pp[0]) channel = pp[0];
          } catch (_) {}
          const parent = window.location.hostname || 'localhost';
          let src = 'https://player.twitch.tv/?parent=' + parent + '&autoplay=true';
          if (video) src += '&video=' + video; else if (channel) src += '&channel=' + channel;
          wrap.innerHTML = `<iframe src="${esc(src)}" class="absolute inset-0 w-full h-full" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>`;

        } else if (type === 'direct') {
          const v = document.createElement('video');
          v.className = 'absolute inset-0 w-full h-full bg-black';
          v.autoplay = true; v.controls = true; v.setAttribute('playsinline', '');
          wrap.appendChild(v);
          if (/\.m3u8?(\?|$)/i.test(url)) {
            _ensureHLS(() => {
              if (window.Hls && Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(v); }
              else if (v.canPlayType('application/vnd.apple.mpegurl')) { v.src = url; }
            });
          } else { v.src = url; }

        } else {
          wrap.innerHTML = `<iframe src="${esc(url)}" class="absolute inset-0 w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
        }
        videoContainer.appendChild(wrap);
      }

      function stopPlayer() { videoContainer.innerHTML = ''; }

      // ══════════════════════════════════════════════════════════
      //  VISTAS
      // ══════════════════════════════════════════════════════════
      function hideAllViews() { homeView.classList.add('hidden'); expiredView.classList.add('hidden'); }
      function showViewer() { hideMatchOverlay(); viewerView.classList.remove('hidden'); viewerView.classList.add('flex'); }
      function showMatchOverlay(html) {
        stopPlayer();
        currentSignalUrl = null;
        viewerView.classList.add('hidden');
        viewerView.classList.remove('flex');
        moContent.innerHTML = html;
        matchOverlay.classList.remove('hidden');
        matchOverlay.classList.add('flex');
      }
      function hideMatchOverlay() { matchOverlay.classList.add('hidden'); matchOverlay.classList.remove('flex'); }
      function showExpired() { hideAllViews(); stopPlayer(); expiredView.classList.remove('hidden'); }

      // ══════════════════════════════════════════════════════════
      //  VISOR DE PARTIDO (señal decidida por el admin)
      // ══════════════════════════════════════════════════════════
      let currentSignalUrl = null;

      function teamsBlock(m) {
        const badge = (name, logo) => `
          <div class="flex flex-col items-center gap-2 w-28">
            ${logo ? `<img src="${esc(logo)}" class="w-16 h-16 object-contain" alt="" onerror="this.style.display='none'">` : `<div class="w-16 h-16 rounded-full bg-slate-700 flex items-center justify-center text-2xl">⚽</div>`}
            <span class="font-bold text-sm text-center">${esc(name || '')}</span>
          </div>`;
        return `<div class="flex items-center justify-center gap-4">${badge(m.home, m.homeLogo)}<span class="text-2xl font-black text-slate-500">VS</span>${badge(m.away, m.awayLogo)}</div>`;
      }

      function applyMatchState(m) {
        document.title = (m.title || 'Partido') + ' · En Vivo';

        if (m.status === 'finished') {
          showMatchOverlay(`
            <div class="text-6xl mb-4">🏁</div>
            <h2 class="text-3xl font-black text-slate-200 mb-2">Transmisión finalizada</h2>
            <p class="text-slate-400 mb-6">${esc(m.title || '')}</p>
            ${teamsBlock(m)}`);
          return;
        }
        if (m.status !== 'live') {
          showMatchOverlay(`
            <div class="inline-block px-4 py-1.5 rounded-full bg-amber-500/20 text-amber-300 text-sm font-bold mb-4">🕐 PRÓXIMAMENTE</div>
            <div class="mb-5">${teamsBlock(m)}</div>
            <p class="text-slate-400 text-sm">${esc(m.competition || '')}</p>
            <p class="text-2xl font-black text-white mt-1">${timeLabel(m) || 'Muy pronto'}</p>
            <p class="text-slate-400 text-sm mt-3">La transmisión comenzará pronto. Esta página se actualiza sola. ⚡</p>`);
          return;
        }

        // EN VIVO — el admin decide la señal (activeSignal)
        const signals = m.signals || [];
        const sig = signals[m.activeSignal || 0] || signals[0];
        if (!sig || !sig.url) {
          showMatchOverlay(`<div class="text-6xl mb-4">📡</div><h2 class="text-2xl font-black text-slate-200">Señal no disponible</h2><p class="text-slate-400 mt-2">El administrador aún no ha asignado una señal.</p>`);
          return;
        }
        showViewer();
        if (currentSignalUrl !== sig.url) { currentSignalUrl = sig.url; mountSingle(sig.url); }
      }

      function openMatch(matchId) {
        hideAllViews();
        enterViewerGuards();
        onSnapshot(doc(db, 'matches', matchId), (snap) => {
          if (!snap.exists()) { showMatchOverlay(`<div class="text-6xl mb-4">❌</div><h2 class="text-2xl font-black text-slate-200">Partido no encontrado</h2>`); return; }
          applyMatchState(snap.data());
        });
      }

      // ══════════════════════════════════════════════════════════
      //  PLATAFORMA CLIENTE (grid de partidos)
      // ══════════════════════════════════════════════════════════
      let allMatches = [];
      let currentFilter = 'all';

      window.goMatch = (slug) => { window.location.href = getBaseDir() + '?slug=' + encodeURIComponent(slug); };

      function matchCard(m) {
        const live = m.status === 'live';
        const badge = live
          ? `<span class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-red-600 text-white text-xs font-black"><span class="w-2 h-2 rounded-full bg-white live-dot"></span>EN VIVO</span>`
          : `<span class="px-2.5 py-1 rounded-full bg-amber-500/20 text-amber-300 text-xs font-bold">🕐 ${esc(timeLabel(m) || 'Próximo')}</span>`;
        const badgeTeam = (name, logo) => `
          <div class="flex flex-col items-center gap-2 flex-1 min-w-0">
            ${logo ? `<img src="${esc(logo)}" class="w-14 h-14 object-contain" alt="" onerror="this.style.display='none'">` : `<div class="w-14 h-14 rounded-full bg-slate-700/80 flex items-center justify-center text-xl">⚽</div>`}
            <span class="font-bold text-sm text-center truncate w-full px-1">${esc(name || '')}</span>
          </div>`;
        return `
          <div class="match-card bg-slate-900/80 rounded-3xl border border-slate-700/60 card-glow overflow-hidden fade-in-up" onclick="goMatch('${esc(m.slug)}')">
            <div class="px-4 pt-4 flex items-center justify-between gap-2">
              <span class="text-xs text-emerald-300/80 font-semibold truncate">${esc(m.competition || '⚽ Partido')}</span>
              ${badge}
            </div>
            <div class="p-5 flex items-center gap-2">
              ${badgeTeam(m.home, m.homeLogo)}
              <span class="text-lg font-black text-slate-500 shrink-0">VS</span>
              ${badgeTeam(m.away, m.awayLogo)}
            </div>
            <div class="px-4 pb-4">
              <div class="w-full text-center py-2.5 rounded-2xl font-bold text-sm ${live ? 'btn-gold text-slate-900' : 'bg-slate-800 text-slate-300'}">
                ${live ? '▶️ Ver ahora' : '🔔 Ver detalle'}
              </div>
            </div>
          </div>`;
      }

      function renderGrid() {
        let list = allMatches.slice();
        if (currentFilter === 'live') list = list.filter(m => m.status === 'live');
        else if (currentFilter === 'upcoming') list = list.filter(m => m.status === 'upcoming');
        else list = list.filter(m => m.status !== 'finished');

        list.sort((a, b) => {
          const la = a.status === 'live' ? 0 : 1, lb = b.status === 'live' ? 0 : 1;
          if (la !== lb) return la - lb;
          return (a.kickoff?.seconds || 0) - (b.kickoff?.seconds || 0);
        });

        if (list.length === 0) {
          matchesGrid.innerHTML = `<div class="col-span-full text-center text-slate-400 py-24"><div class="text-6xl mb-4 opacity-50">📭</div><p class="text-lg">No hay partidos ${currentFilter === 'live' ? 'en vivo' : currentFilter === 'upcoming' ? 'próximos' : 'disponibles'} por ahora</p></div>`;
          return;
        }
        matchesGrid.innerHTML = list.map(matchCard).join('');
      }

      filterChips.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => {
        currentFilter = chip.dataset.filter;
        filterChips.querySelectorAll('.chip').forEach(c => {
          const on = c === chip;
          c.classList.toggle('bg-gradient-to-r', on);
          c.classList.toggle('from-emerald-600', on);
          c.classList.toggle('to-teal-600', on);
          c.classList.toggle('text-white', on);
          c.classList.toggle('shadow-lg', on);
          c.classList.toggle('bg-slate-800/70', !on);
          c.classList.toggle('text-slate-300', !on);
        });
        renderGrid();
      }));

      function startHome() {
        homeView.classList.remove('hidden');
        onSnapshot(matchesCol, (snap) => {
          allMatches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderGrid();
        });
      }

      // ══════════════════════════════════════════════════════════
      //  ENLACES LEGACY (una sola señal)
      // ══════════════════════════════════════════════════════════
      function playSingle(url) {
        if (!url) { showExpired(); return; }
        enterViewerGuards();
        hideAllViews();
        showViewer();
        currentSignalUrl = url;
        mountSingle(url);
      }
      function playLegacyLink(linkData) {
        const expiresAt = new Date(linkData.expiresAt.seconds * 1000);
        if (new Date() > expiresAt) { showExpired(); return; }
        const url = (linkData.s1 && safeDecode(linkData.s1)) || (linkData.s2 && safeDecode(linkData.s2)) || null;
        playSingle(url);
      }

      // ══════════════════════════════════════════════════════════
      //  RUTEO
      // ══════════════════════════════════════════════════════════
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const s1 = params.get('s1'), s2 = params.get('s2');
      const linkId = params.get('linkId');
      const firstParamStream = (s1 && safeDecode(s1)) || (s2 && safeDecode(s2)) || null;

      if (slug) {
        try {
          const mSnap = await getDocs(matchesCol);
          const matchDoc = mSnap.docs.find(d => d.data().slug === slug);
          if (matchDoc) {
            try { history.replaceState(null, '', getBaseDir() + slug); } catch (_) {}
            openMatch(matchDoc.id);
          } else {
            const lSnap = await getDocs(linksCol);
            const linkData = lSnap.docs.map(d => d.data()).filter(d => d.slug === slug)
              .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0))[0];
            if (linkData) { try { history.replaceState(null, '', getBaseDir() + slug); } catch (_) {} playLegacyLink(linkData); }
            else showExpired();
          }
        } catch (e) { console.error('Error de ruteo (slug):', e); showExpired(); }
      } else if (linkId) {
        try {
          const lSnap = await getDocs(linksCol);
          const linkDoc = lSnap.docs.find(d => d.id === linkId);
          if (linkDoc) playLegacyLink(linkDoc.data());
          else if (firstParamStream) playSingle(firstParamStream);
          else showExpired();
        } catch (e) { console.error('Error de ruteo (linkId):', e); firstParamStream ? playSingle(firstParamStream) : startHome(); }
      } else if (firstParamStream) {
        playSingle(firstParamStream);
      } else {
        startHome();
      }

      // ══════════════════════════════════════════════════════════
      //  PANTALLA COMPLETA
      // ══════════════════════════════════════════════════════════
      const iconFullscreen = document.getElementById('icon-fullscreen');
      const textFullscreen = document.getElementById('text-fullscreen');
      const updateFullscreenUI = () => {
        const isF = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        if (isF) {
          iconFullscreen.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>';
          textFullscreen.textContent = 'Salir';
        } else {
          iconFullscreen.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
          textFullscreen.textContent = 'Pantalla Completa';
        }
      };
      btnFullscreen.addEventListener('click', () => {
        const elem = viewerView;
        if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
          (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
        } else {
          (elem.requestFullscreen || elem.webkitRequestFullscreen || elem.msRequestFullscreen).call(elem);
        }
      });
      document.addEventListener('fullscreenchange', updateFullscreenUI);
      document.addEventListener('webkitfullscreenchange', updateFullscreenUI);
      document.addEventListener('msfullscreenchange', updateFullscreenUI);
    });
  </script>
</body>
</html>
