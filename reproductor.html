  <!-- CSS propio y mínimo. SIN Tailwind, SIN animaciones de fondo, SIN blur:
       página ligerísima para Smart TV. Solo el video + 2 botones. -->
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { background: #000; color: #fff; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    .hidden { display: none !important; }

    #viewer-view { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; }
    #video-container { width: 100%; height: 100%; }
    .player-wrap { position: relative; width: 100%; height: 100%; }
    .player-wrap > iframe, .player-wrap > video {
      position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000;
    }

    .viewer-btn {
      position: absolute; z-index: 50; display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border: none; cursor: pointer;
      background: rgba(0,0,0,0.72); color: #fff; border-radius: 12px; opacity: 0.55;
      transition: opacity .2s; box-shadow: 0 3px 14px rgba(0,0,0,0.5); text-decoration: none;
    }
    .viewer-btn:hover, .viewer-btn:focus { opacity: 0.95; }
    .viewer-btn svg { width: 22px; height: 22px; }
    #btn-home { top: 16px; left: 16px; }
    #btn-fullscreen { bottom: 16px; left: 16px; }

    #match-overlay { position: fixed; inset: 0; z-index: 40; padding: 24px; text-align: center;
      background: linear-gradient(135deg,#020617,#0f172a); display: flex; justify-content: center; overflow-y: auto; }
    #mo-content { margin: auto; width: 100%; }   /* centra si cabe, permite scroll si no */
    .mo-badge { display:inline-block; padding:6px 16px; border-radius:999px; font-weight:700; font-size:14px; margin-bottom:16px;
      background: rgba(132,204,22,0.16); color:#b6f05c; }
    .mo-time { font-size: 26px; font-weight: 900; margin: 6px 0; }
    .cd-clock { font-size: 46px; font-weight: 900; letter-spacing: 2px; margin: 12px 0 6px; color: #a3e635; font-variant-numeric: tabular-nums; }
    .mo-note { color:#94a3b8; font-size:14px; margin-top:12px; }
    .mo-btn { display:inline-block; margin-top:28px; padding:12px 30px; border-radius:16px; font-weight:700;
      color:#0c1502; text-decoration:none; background: linear-gradient(135deg,#a3e635,#65a30d); }

    #expired-view { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(135deg,#7f1d1d,#020617); text-align: center; }
    .exp-card { background: rgba(15,23,42,0.92); border:1px solid rgba(239,68,68,0.3); border-radius: 24px; padding: 40px; max-width: 420px; }
    .exp-card h2 { color:#f87171; font-size:32px; font-weight:900; margin:0 0 10px; }
    .exp-card p { color:#cbd5e1; margin:0 0 24px; }
    .exp-btn { display:inline-block; padding:14px 32px; border-radius:16px; font-weight:700; color:#0c1502; text-decoration:none; background: linear-gradient(135deg,#a3e635,#65a30d); }

    /* ── Pantalla de despedida (partido finalizado) ── */
    .fin-wrap { max-width: 560px; width: 100%; }
    .fin-thanks { color:#9fb0e6; font-size:14px; margin: 2px 0 14px; }
    .fin-board { display:flex; align-items:center; justify-content:center; gap:16px; margin: 6px 0 4px; }
    .fin-team { display:flex; flex-direction:column; align-items:center; gap:8px; width:120px; }
    .fin-team img { width:60px; height:60px; border-radius:50%; object-fit:cover; background:#223; }
    .fin-team .noimg { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; background:#223; }
    .fin-team span { font-weight:700; font-size:14px; text-align:center; }
    .fin-score { font-size:44px; font-weight:900; letter-spacing:2px; font-variant-numeric:tabular-nums; }
    .fin-score i { color:#64748b; font-style:normal; margin:0 8px; }
    .fin-comp { color:#94a3b8; font-size:13px; margin-top:4px; }
    .next-card { margin-top: 22px; background: rgba(30,46,140,0.35); border:1px solid rgba(99,120,240,0.35); border-radius:16px; padding:14px 16px; }
    .next-card .lbl { color:#9fb0e6; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .next-card .nm { font-weight:800; font-size:16px; margin:4px 0; }
    .next-card .tm { color:#9fb0e6; font-size:13px; }
    .next-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
    .next-actions a { flex:1; min-width:130px; text-align:center; padding:11px 14px; border-radius:12px; font-weight:800; font-size:14px; }
    .btn-primary { background: linear-gradient(135deg,#a3e635,#65a30d); color:#0c1502; }
    .btn-remind { background: rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.2); }

    /* Resumen de YouTube en la despedida */
    .fin-video { position: relative; width: 100%; aspect-ratio: 16/9; margin: 16px 0 4px; border-radius: 14px; overflow: hidden; background: #000; box-shadow: 0 8px 26px rgba(0,0,0,0.5); }
    .fin-video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .fin-video-lbl { color:#9fb0e6; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-top:14px; }

    /* ── Barra de señales flotante (cambiar de señal sin salir) ──
       Ligerísima: solo pills con opacity; sin blur ni animaciones continuas. */
    #viewers-pill { position: fixed; top: 16px; left: 16px; z-index: 50; pointer-events: none;
      background: rgba(2,6,23,0.72); border: 1px solid rgba(163,230,53,0.45); color: #d9f99d;
      font-weight: 800; font-size: 13px; padding: 6px 13px; border-radius: 999px; }
    #sig-bar { position: fixed; top: 16px; right: 16px; z-index: 50; display: flex; gap: 8px;
      align-items: center; flex-wrap: wrap; justify-content: flex-end; max-width: calc(100% - 120px); }
    .sig-pill { border: none; cursor: pointer; background: rgba(0,0,0,0.72); color: #fff; border-radius: 999px;
      padding: 9px 14px; font-size: 13px; font-weight: 700; opacity: 0.6; box-shadow: 0 3px 14px rgba(0,0,0,0.5);
      max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px; line-height: 1; }
    .sig-pill:hover { opacity: 0.97; }
    .sig-pill.active { background: linear-gradient(135deg,#a3e635,#65a30d); color: #0c1502; opacity: 1; }
    .sig-pill.report { background: rgba(127,29,29,0.82); }
    .sig-pill.next { background: rgba(30,46,140,0.82); }

    /* Aviso breve (toast) */
    #rp-toast { position: fixed; left: 50%; bottom: 78px; transform: translateX(-50%); z-index: 60;
      background: rgba(15,23,42,0.95); color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 14px;
      font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,0.5); opacity: 0; transition: opacity .25s;
      pointer-events: none; max-width: 90%; text-align: center; }
    #rp-toast.show { opacity: 1; }

    /* Foco visible para navegar con el control de la TV (teclas/flechas) */
    .viewer-btn:focus-visible, .sig-pill:focus-visible, .mo-btn:focus-visible,
    .exp-btn:focus-visible, .next-actions a:focus-visible {
      outline: 3px solid #a3e635; outline-offset: 2px; opacity: 1;
    }
    @media (prefers-reduced-motion: reduce) { #rp-toast { transition: none; } }
  </style>
</head>
<body>

  <!-- Visor (una sola señal) -->
  <div id="viewer-view" class="hidden">
    <a href="./" id="btn-home" class="viewer-btn" title="Inicio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <button id="btn-fullscreen" class="viewer-btn" title="Pantalla completa">
      <svg id="icon-fullscreen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
    <div id="video-container"></div>
  </div>

  <!-- Overlay pre-partido / finalizado -->
  <div id="match-overlay" class="hidden"><div id="mo-content"></div></div>

  <!-- Barra de señales flotante (se llena solo si el partido tiene >1 señal) -->
  <div id="viewers-pill" class="hidden">👁</div>
  <div id="sig-bar" class="hidden"></div>

  <!-- Aviso breve -->
  <div id="rp-toast"></div>

  <!-- Enlace expirado / no disponible -->
  <div id="expired-view" class="hidden">
    <div class="exp-card">
      <div style="font-size:56px;margin-bottom:12px;">⏳</div>
      <h2>¡Enlace no disponible!</h2>
      <p>Este enlace ha caducado o no existe</p>
      <a href="./" class="exp-btn">🏠 Volver al Inicio</a>
    </div>
  </div>

  <script type="module">
    import { getFirestore, collection, getDocs, getDoc, doc, onSnapshot, setDoc, deleteDoc, increment, query, where, getCountFromServer, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
      const db = getFirestore();
      const matchesCol = collection(db, "matches");
      const linksCol = collection(db, "generatedLinks");

      const $ = id => document.getElementById(id);
      const viewerView = $('viewer-view');
      const videoContainer = $('video-container');
      const expiredView = $('expired-view');
      const matchOverlay = $('match-overlay');
      const moContent = $('mo-content');
      const btnFullscreen = $('btn-fullscreen');
      const sigBar = $('sig-bar');
      const toastEl = $('rp-toast');

      const safeDecode = (v) => { try { return decodeURIComponent(v); } catch (_) { return v; } };
      const getBaseDir = () => { const p = window.location.pathname; return p.substring(0, p.lastIndexOf('/') + 1); };
      const esc = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const SPORT_EMOJI = { futbol:'⚽', ufc:'🥋', boxeo:'🥊', lucha:'🤼', basquet:'🏀', beisbol:'⚾', tenis:'🎾', motor:'🏎️', otro:'🏆' };
      const sportEmoji = (m) => SPORT_EMOJI[(m && m.sport)] || '⚽';
      const isToday = (d) => { const n = new Date(); return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear(); };
      const timeLabel = (m) => {
        if (!m.kickoff?.seconds) return '';
        const d = new Date(m.kickoff.seconds * 1000);
        const hm = new Intl.DateTimeFormat('es-ES', { hour:'2-digit', minute:'2-digit' }).format(d);
        return isToday(d) ? 'Hoy ' + hm : new Intl.DateTimeFormat('es-ES', { day:'2-digit', month:'2-digit' }).format(d) + ' ' + hm;
      };

      // Bloquear popups (ads de iframes)
      window.open = function () { return null; };

      // ── Aviso breve (toast) ──
      let toastTimer = null;
      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
      }

      // ── Estado de señales (para cambiar sin salir + auto-fallback) ──
      let currentSigIdx = null;          // señal elegida en esta sesión (null = usar la del ?s= / activeSignal)
      const failedSigs = new Set();      // índices de señales que dieron error de reproducción

      // ── Analítica de vistas: solo ESCRIBE contadores (no lee). Cuenta una vista por
      //    sesión por partido, y por señal usada ("en qué enlace vieron"). ──
      function trackView(slug, sigIdx, title) {
        if (!slug) return;
        try {
          const today = new Date().toISOString().slice(0, 10);
          const updates = { updatedAt: Date.now() };
          let changed = false;
          const vkey = 'topfut-view-' + slug;
          if (!sessionStorage.getItem(vkey)) {
            sessionStorage.setItem(vkey, '1');
            updates.viewsTotal = increment(1);
            updates.daily = { [today]: { views: increment(1) } };
            updates.matches = { [slug]: { views: increment(1), title: title || slug } };
            changed = true;
          }
          const skey = 'topfut-sig-' + slug + '-' + sigIdx;
          if (sigIdx != null && !sessionStorage.getItem(skey)) {
            sessionStorage.setItem(skey, '1');
            updates.matches = updates.matches || { [slug]: {} };
            updates.matches[slug] = updates.matches[slug] || {};
            updates.matches[slug].signals = { [String(sigIdx)]: increment(1) };
            changed = true;
          }
          if (changed) setDoc(doc(db, 'public', 'stats'), updates, { merge: true }).catch(() => {});
        } catch (e) {}
      }

      // ── Resumen de YouTube ──
      function ytEmbed(url) {
        if (!url) return '';
        let id = '';
        const m1 = url.match(/[?&]v=([^&]+)/);
        const m2 = url.match(/youtu\.be\/([^?&/]+)/);
        const m3 = url.match(/youtube\.com\/embed\/([^?&/]+)/);
        if (m1) id = m1[1]; else if (m2) id = m2[1]; else if (m3) id = m3[1];
        if (!id) return url;   // si ya es un embed u otro formato, úsalo tal cual
        return 'https://www.youtube-nocookie.com/embed/' + id + '?rel=0&modestbranding=1&playsinline=1';
      }
      function ytSearchUrl(m) {
        const base = (m.home && m.away) ? `${m.home} vs ${m.away}` : (m.title || m.home || m.away || '');
        const q = base + ' resumen highlights ' + (m.competition || '');
        return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q.trim());
      }

      // Próximo partido (para el acceso rápido ⏭ mientras se ve)
      function nextMatchSlug() {
        const list = window._allMatches || [];
        const cur = window._m || {};
        const now = Date.now();
        const next = list
          .filter(x => x.slug && x.slug !== cur.slug && x.status !== 'finished'
            && x.kickoff?.seconds && x.kickoff.seconds * 1000 > now)
          .sort((a, b) => a.kickoff.seconds - b.kickoff.seconds)[0];
        return next ? next.slug : null;
      }

      // Dibuja la barra flotante: una pill por señal + "no funciona" + siguiente.
      function renderSignalBar(signals, activeIdx) {
        const sigs = signals || [];
        const nextSlug = nextMatchSlug();
        if (sigs.length < 2 && !nextSlug) { sigBar.classList.add('hidden'); sigBar.innerHTML = ''; return; }
        let html = '';
        if (sigs.length >= 2) {
          html += sigs.map((s, i) =>
            `<button class="sig-pill${i === activeIdx ? ' active' : ''}" data-sig="${i}">📶 ${esc(s.name || ('Señal ' + (i + 1)))}</button>`
          ).join('');
          html += `<button class="sig-pill report" data-report="1">⚠️ No funciona</button>`;
        }
        if (nextSlug) html += `<a class="sig-pill next" href="reproductor.html?slug=${encodeURIComponent(nextSlug)}" title="Siguiente evento">⏭</a>`;
        sigBar.innerHTML = html;
        sigBar.classList.remove('hidden');
        sigBar.querySelectorAll('[data-sig]').forEach(b =>
          b.addEventListener('click', () => switchSignal(Number(b.dataset.sig), true)));
        const rep = sigBar.querySelector('[data-report]');
        if (rep) rep.addEventListener('click', () => { failedSigs.add(currentSigIdx); tryNextSignal(); });
      }

      // Cambiar a una señal concreta (manual = elegida por el usuario)
      function switchSignal(i, manual) {
        const sigs = window._sigs || [];
        if (i < 0 || i >= sigs.length || i === currentSigIdx) return;
        currentSigIdx = i;
        if (manual) failedSigs.delete(i);     // el usuario la elige a propósito: darle otra oportunidad
        toast('Cambiando a ' + (sigs[i]?.name || ('Señal ' + (i + 1))) + '…');
        applyMatchState(window._m);
      }

      // Probar la siguiente señal disponible (auto-fallback o botón "no funciona")
      function tryNextSignal() {
        const sigs = window._sigs || [];
        if (sigs.length < 2) { toast('No hay otra señal disponible'); return; }
        for (let k = 1; k <= sigs.length; k++) {
          const cand = ((currentSigIdx ?? 0) + k) % sigs.length;
          if (!failedSigs.has(cand)) { switchSignal(cand, false); return; }
        }
        toast('Ninguna señal disponible por ahora. Intenta más tarde.');
      }

      // Error real de reproducción (solo se detecta en video/HLS propios, no en iframes de terceros)
      function onMediaError() {
        const sigs = window._sigs || [];
        if (sigs.length > 1 && currentSigIdx != null && !failedSigs.has(currentSigIdx)) {
          failedSigs.add(currentSigIdx);
          toast('Señal con problemas, probando otra…');
          tryNextSignal();
        }
      }

      // ── Reproductor de una sola señal ──
      let _hlsReady = false, _hlsQ = [];
      function _ensureHLS(cb) {
        if (_hlsReady) { cb(); return; }
        _hlsQ.push(cb);
        if (!window._hlsLoading) {
          window._hlsLoading = true;
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
          s.onload = () => { _hlsReady = true; _hlsQ.forEach(f => f()); _hlsQ = []; };
          document.head.appendChild(s);
        }
      }

      function detectStreamType(url) {
        if (/youtube\.com|youtube-nocookie\.com|youtu\.be/.test(url)) return 'youtube';
        if (/twitch\.tv/.test(url)) return 'twitch';
        if (/\.(m3u8|m3u|mp4|ts|webm)(\?|$)/i.test(url)) return 'direct';
        return 'iframe';
      }

      function mountSingle(url) {
        videoContainer.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'player-wrap';
        const type = detectStreamType(url);

        if (type === 'youtube') {
          let embed = url
            .replace(/youtube\.com\/watch\?v=([^&]+)/, 'youtube.com/embed/$1')
            .replace(/youtu\.be\/([^?]+)/, 'youtube.com/embed/$1')
            .replace(/youtube-nocookie\.com\/watch\?v=([^&]+)/, 'youtube-nocookie.com/embed/$1');
          embed += (embed.includes('?') ? '&' : '?') + 'autoplay=1&playsinline=1';
          wrap.innerHTML = `<iframe src="${esc(embed)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;

        } else if (type === 'twitch') {
          let channel = '', video = '';
          try {
            const u = new URL(url.startsWith('http') ? url : 'https://' + url);
            const vP = u.searchParams.get('video'), chP = u.searchParams.get('channel');
            const pp = u.pathname.split('/').filter(Boolean);
            if (vP) video = vP;
            else if (chP) channel = chP;
            else if (pp[0] === 'videos' && pp[1]) video = pp[1];
            else if (pp[0]) channel = pp[0];
          } catch (_) {}
          const parent = window.location.hostname || 'localhost';
          let src = 'https://player.twitch.tv/?parent=' + parent + '&autoplay=true';
          if (video) src += '&video=' + video; else if (channel) src += '&channel=' + channel;
          wrap.innerHTML = `<iframe src="${esc(src)}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;

        } else if (type === 'direct') {
          const v = document.createElement('video');
          v.autoplay = true; v.controls = true; v.setAttribute('playsinline', '');
          v.addEventListener('error', onMediaError);   // auto-fallback si el stream cae
          wrap.appendChild(v);
          if (/\.m3u8?(\?|$)/i.test(url)) {
            _ensureHLS(() => {
              if (window.Hls && Hls.isSupported()) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(v);
                hls.on(Hls.Events.ERROR, (_e, data) => { if (data && data.fatal) onMediaError(); });
              }
              else if (v.canPlayType('application/vnd.apple.mpegurl')) { v.src = url; }
            });
          } else { v.src = url; }

        } else {
          wrap.innerHTML = `<iframe src="${esc(url)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
        }
        videoContainer.appendChild(wrap);
      }

      function stopPlayer() { videoContainer.innerHTML = ''; }
      function hideSigBar() { sigBar.classList.add('hidden'); sigBar.innerHTML = ''; }
      function showViewer() { matchOverlay.classList.add('hidden'); expiredView.classList.add('hidden'); viewerView.classList.remove('hidden'); }
      function showMatchOverlay(html) {
        stopPlayer(); currentSignalUrl = null; hideSigBar();
        viewerView.classList.add('hidden'); expiredView.classList.add('hidden');
        moContent.innerHTML = html; matchOverlay.classList.remove('hidden');
      }
      // Enlace expirado / evento borrado → breve aviso y redirección al INICIO.
      // location.replace no deja historial (el botón "Atrás" del control de TV
      // no vuelve al enlace muerto) y la URL queda limpia (sin /index.html).
      let redirecting = false;
      function goHome() {
        if (redirecting) return;
        redirecting = true;
        try { stopViewers(); } catch (_) {}
        try { history.replaceState(null, '', getBaseDir()); } catch (_) {}
        window.location.replace(getBaseDir());
      }
      function showExpired() {
        if (redirecting) return;
        stopPlayer(); hideSigBar(); clearCountdown();
        viewerView.classList.add('hidden'); expiredView.classList.add('hidden');
        showMatchOverlay(`
          <div style="max-width:520px;">
            <div style="font-size:56px;margin-bottom:10px;">⏳</div>
            <h2 style="font-size:24px;font-weight:900;color:#e2e8f0;">Este enlace ya expiró</h2>
            <p style="color:#94a3b8;margin-top:8px;">Te llevamos al inicio para ver los eventos disponibles…</p>
            <a href="./" class="mo-btn">🏠 Ir al inicio ahora</a>
          </div>`);
        setTimeout(goHome, 2500);
      }

      // ── Visor de partido (la señal la decide el admin) ──
      let currentSignalUrl = null;

      // Cuenta regresiva + activación automática por horario
      const AUTO_PLAY_MIN = 10;   // el reproductor arranca solo 10 min antes del inicio
      let countdownTimer = null;
      const clearCountdown = () => { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } };
      const koMillis = (m) => (m.kickoff?.seconds ? m.kickoff.seconds * 1000 : null);
      function formatCountdown(ms) {
        if (ms <= 0) return '00:00:00';
        let s = Math.floor(ms / 1000);
        const d = Math.floor(s / 86400); s -= d * 86400;
        const h = Math.floor(s / 3600); s -= h * 3600;
        const mm = Math.floor(s / 60); s -= mm * 60;
        const p = n => String(n).padStart(2, '0');
        return (d > 0 ? d + 'd ' : '') + p(h) + ':' + p(mm) + ':' + p(s);
      }
      function shouldPlay(m) {
        if (m.status === 'finished') return false;
        if (m.status === 'live') return true;       // el admin lo fuerza en vivo
        const ko = koMillis(m);
        if (ko == null) return false;               // sin hora → esperar al admin
        return Date.now() >= ko - AUTO_PLAY_MIN * 60000;
      }
      function updateCountdownText() {
        const el = document.getElementById('cd-big');
        if (!el || !window._m) return;
        const ko = koMillis(window._m);
        el.textContent = ko ? formatCountdown(ko - Date.now()) : '';
      }

      // ── Despedida (solo lee de Firebase) ──
      const dtShort = (m) => {
        if (!m.kickoff?.seconds) return '';
        const d = new Date(m.kickoff.seconds * 1000);
        const p = n => String(n).padStart(2, '0');
        return `${d.getDate()}/${d.getMonth() + 1} ${p(d.getHours())}:${p(d.getMinutes())}`;
      };
      function gcalUrl(m) {
        if (!m.kickoff?.seconds) return null;
        const start = new Date(m.kickoff.seconds * 1000);
        const end = new Date(start.getTime() + 2 * 3600000);
        const fmt = d => d.toISOString().replace(/[-:]|\.\d{3}/g, '');
        return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
          + '&text=' + encodeURIComponent(m.title || 'Evento')
          + '&dates=' + fmt(start) + '/' + fmt(end)
          + '&details=' + encodeURIComponent('Míralo en vivo en la plataforma');
      }
      function finTeam(name, logo, emo) {
        return `<div class="fin-team">
          ${logo ? `<img src="${esc(logo)}" onerror="this.outerHTML='<div class=&quot;noimg&quot;>${emo || '⚽'}</div>'">` : `<div class="noimg">${emo || '⚽'}</div>`}
          <span>${esc(name || '')}</span></div>`;
      }
      async function showFinishedScreen(m) {
        const emo = sportEmoji(m);
        const fs = m.finalScore || {};
        const hasScore = fs.home != null && fs.away != null && fs.home !== '' && fs.away !== '';
        const resultTxt = m.finalResultText
          ? `<div style="margin:10px 0 0;font-size:18px;font-weight:800;color:#a3e635;">🏆 ${esc(m.finalResultText)}</div>` : '';
        const scoreHtml = (hasScore
          ? `<div class="fin-board">${finTeam(m.home, m.homeLogo, emo)}<div class="fin-score">${esc(String(fs.home))}<i>-</i>${esc(String(fs.away))}</div>${finTeam(m.away, m.awayLogo, emo)}</div>`
          : `<div style="margin:8px 0;">${teamsBlock(m)}</div>`) + resultTxt;
        // Resumen: se embebe el enlace de YouTube que el admin pegó en el panel
        // (así elige un video que SÍ permita reproducirse embebido). Si no hay ninguno,
        // se ofrece la búsqueda en YouTube.
        const highlightsHtml = m.highlightsUrl
          ? `<div class="fin-video-lbl">🎬 Resumen del evento</div>
             <div class="fin-video"><iframe src="${esc(ytEmbed(m.highlightsUrl))}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>
             <a href="${esc(m.highlightsUrl)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;color:#9fb0e6;font-size:12px;">Abrir en YouTube ↗</a>`
          : `<a class="mo-btn" style="margin-top:16px;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.2);" href="${esc(ytSearchUrl(m))}" target="_blank" rel="noopener">🎬 Ver resumen en YouTube</a>`;
        showMatchOverlay(`
          <div class="fin-wrap">
            <div style="font-size:52px;margin-bottom:6px;">🏁</div>
            <h2 style="font-size:26px;font-weight:900;margin:0;color:#e2e8f0;">La transmisión ha finalizado</h2>
            <p class="fin-thanks">¡Gracias por verlo a través de nuestra plataforma! 🙌</p>
            ${scoreHtml}
            <div class="fin-comp">${esc(m.competition || '')}${m.round ? ' · ' + esc(m.round) : ''}</div>
            ${highlightsHtml}
            <div id="next-slot"></div>
            <a href="./" class="mo-btn" style="margin-top:22px;">🏠 Volver al inicio</a>
          </div>`);
        // Próximo partido: UNA sola consulta (sin sondeo en segundo plano)
        try {
          const snap = await getDocs(matchesCol);
          const now = Date.now();
          const next = snap.docs.map(d => ({ id: d.id, ...d.data() }))
            .filter(x => x.slug !== m.slug && x.status !== 'finished' && x.kickoff?.seconds && x.kickoff.seconds * 1000 > now)
            .sort((a, b) => a.kickoff.seconds - b.kickoff.seconds)[0];
          const slot = document.getElementById('next-slot');
          if (slot && next) {
            const gc = gcalUrl(next);
            slot.innerHTML = `
              <div class="next-card">
                <div class="lbl">▶️ Próximo evento</div>
                <div class="nm">${esc(next.title || [next.home, next.away].filter(Boolean).join(' vs '))}</div>
                <div class="tm">${esc(next.competition || '')} · 🕐 ${esc(dtShort(next))}</div>
                <div class="next-actions">
                  <a class="btn-primary" href="reproductor.html?slug=${encodeURIComponent(next.slug)}">Ver evento</a>
                  ${gc ? `<a class="btn-remind" href="${gc}" target="_blank" rel="noopener">🔔 Recordarme</a>` : ''}
                </div>
              </div>`;
          }
        } catch (_) {}
      }

      function teamsBlock(m) {
        const emo = sportEmoji(m);
        const badge = (name, logo) => `
          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;min-width:110px;max-width:200px;">
            ${logo ? `<img src="${esc(logo)}" style="width:64px;height:64px;object-fit:contain;" onerror="this.style.display='none'">` : `<div style="width:64px;height:64px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:26px;">${emo}</div>`}
            <span style="font-weight:700;font-size:14px;text-align:center;">${esc(name || '')}</span>
          </div>`;
        if (!(m.home && m.away)) {
          // Evento completo (gala UFC, función de lucha, GP…): un solo bloque, sin "VS"
          return `<div style="display:flex;align-items:center;justify-content:center;">${badge(m.title || m.home || m.away, m.homeLogo || m.awayLogo)}</div>`;
        }
        return `<div style="display:flex;align-items:center;justify-content:center;gap:16px;">${badge(m.home, m.homeLogo)}<span style="font-size:22px;font-weight:900;color:#64748b;">VS</span>${badge(m.away, m.awayLogo)}</div>`;
      }

      // ── Espectadores en vivo (ultraliviano para TVs) ─────────────
      // Sin listeners en tiempo real: cada espectador escribe un "latido"
      // (1 doc mínimo) cada 60 s y consulta el TOTAL con una agregación
      // count() cada 60 s. Total: ~2 peticiones pequeñas por minuto.
      const VIEW_HB_MS = 60000;          // latido cada 60 s
      const VIEW_WINDOW_MS = 150000;     // se cuenta a quien latió en los últimos 2.5 min
      let viewHbT = null, viewCountT = null, viewSlugNow = null, viewLive = false, viewIdCache = null;
      function viewerId() {
        if (viewIdCache) return viewIdCache;
        try {
          viewIdCache = sessionStorage.getItem('tf-vid');
          if (!viewIdCache) { viewIdCache = Math.random().toString(36).slice(2, 10); sessionStorage.setItem('tf-vid', viewIdCache); }
        } catch (_) { viewIdCache = Math.random().toString(36).slice(2, 10); }
        return viewIdCache;
      }
      function viewBeat() {
        if (!viewSlugNow) return;
        setDoc(doc(db, 'presence', viewSlugNow, 'v', viewerId()), { t: serverTimestamp() }).catch(() => {});
      }
      async function viewCount() {
        if (!viewSlugNow) return;
        try {
          const cutoff = Timestamp.fromMillis(Date.now() - VIEW_WINDOW_MS);
          const snap = await getCountFromServer(query(collection(db, 'presence', viewSlugNow, 'v'), where('t', '>', cutoff)));
          const n = snap.data().count || 0;
          const pill = $('viewers-pill');
          if (n >= 1) { pill.textContent = '👁 ' + n + ' viendo'; pill.classList.remove('hidden'); }
          else pill.classList.add('hidden');
        } catch (_) { /* si falla, simplemente no se muestra */ }
      }
      function startViewers(slug) {
        if (viewHbT && viewSlugNow === slug) return;
        stopViewers();
        viewSlugNow = slug; viewLive = true;
        viewBeat();
        setTimeout(viewCount, 2500);
        viewHbT = setInterval(viewBeat, VIEW_HB_MS);
        viewCountT = setInterval(viewCount, VIEW_HB_MS);
      }
      function stopViewers(keepSlug) {
        clearInterval(viewHbT); clearInterval(viewCountT);
        viewHbT = viewCountT = null;
        if (!keepSlug) { viewSlugNow = null; viewLive = false; }
        const pill = $('viewers-pill'); if (pill) pill.classList.add('hidden');
      }
      // Pestaña oculta / TV en standby: pausa todo. Al volver, se reanuda.
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) stopViewers(true);
        else if (viewSlugNow && viewLive) { const sl = viewSlugNow; viewSlugNow = null; startViewers(sl); }
      });
      // Al salir: intento de borrar mi latido (si no llega, el filtro por tiempo lo descarta solo)
      window.addEventListener('pagehide', () => {
        if (viewSlugNow) { try { deleteDoc(doc(db, 'presence', viewSlugNow, 'v', viewerId())); } catch (_) {} }
        stopViewers();
      });

      function applyMatchState(m) {
        clearCountdown();
        window._m = m;
        document.title = (m.title || 'Evento') + ' · En Vivo';

        // ¿Partido finalizado? → despedida
        if (m.status === 'finished') { stopViewers(); showFinishedScreen(m); return; }

        // ¿Toca reproducir? (admin en vivo, o faltan <= AUTO_PLAY_MIN min)
        if (shouldPlay(m)) {
          const signals = m.signals || [];
          window._sigs = signals;
          // Prioridad: la señal que el usuario cambió aquí (currentSigIdx) >
          // la que eligió en el index (?s=) > la activa del admin.
          let idx = (currentSigIdx != null) ? currentSigIdx
            : (sIdx != null ? sIdx : (m.activeSignal || 0));
          if (idx < 0 || idx >= signals.length) idx = 0;
          currentSigIdx = signals.length ? idx : null;
          const sig = signals[idx] || signals[0];
          if (!sig || !sig.url) {
            hideSigBar();
            showMatchOverlay(`
              <div style="max-width:520px;">
                <div style="font-size:56px;margin-bottom:12px;">📡</div>
                <h2 style="font-size:24px;font-weight:900;color:#e2e8f0;">Señal no disponible</h2>
                <p style="color:#94a3b8;margin-top:8px;">El administrador aún no ha asignado una señal.</p>
                <a href="./" class="mo-btn">🏠 Ver otros eventos</a>
              </div>`);
            return;
          }
          showViewer();
          renderSignalBar(signals, idx);
          if (currentSignalUrl !== sig.url) { currentSignalUrl = sig.url; mountSingle(sig.url); }
          trackView(m.slug, idx, m.title);   // cuenta la vista + la señal usada
          startViewers(m.slug);              // contador de espectadores en vivo
          return;
        }

        stopViewers();
        // Próximamente → cuenta regresiva y auto-arranque
        const timeStr = koMillis(m) ? timeLabel(m) : 'Por confirmar';
        showMatchOverlay(`
          <div style="max-width:560px;">
            <span class="mo-badge">🕐 PRÓXIMAMENTE</span>
            <div style="margin-bottom:14px;">${teamsBlock(m)}</div>
            <p style="color:#94a3b8;font-size:14px;margin:0;">${esc(m.competition || '')}</p>
            <p style="color:#e2e8f0;font-size:15px;margin:6px 0 0;">🕐 Inicio: ${esc(timeStr)}</p>
            <div class="cd-clock" id="cd-big">--:--:--</div>
            <p class="mo-note">▶️ La transmisión se activa sola ${AUTO_PLAY_MIN} min antes del inicio.</p>
            <a href="./" class="mo-btn">🏠 Ver otros eventos</a>
          </div>`);
        updateCountdownText();
        countdownTimer = setInterval(() => {
          if (shouldPlay(window._m)) applyMatchState(window._m);  // arranca el reproductor
          else updateCountdownText();
        }, 1000);
      }

      // Lee el agregado público (1 doc); si no existe, cae a la colección.
      async function readSchedule() {
        try {
          const snap = await getDoc(doc(db, 'public', 'schedule'));
          if (snap.exists() && Array.isArray(snap.data().matches)) return snap.data().matches;
        } catch (e) { console.error('readSchedule', e); }
        const qs = await getDocs(matchesCol);
        return qs.docs.map(d => ({ id: d.id, ...d.data() }));
      }

      // Visor de partido: escucha EN VIVO el único doc agregado (public/schedule),
      // NO toda la colección. Así, cuando el admin cambia la señal (recicla una URL
      // temporal), finaliza el partido, etc., el reproductor reacciona al instante
      // SIN refrescar. applyMatchState solo re-monta el <iframe> si la URL de la
      // señal elegida cambió, así el video no se reinicia por cambios ajenos.
      function startMatchViewer(slug) {
        const handle = (matches) => {
          window._allMatches = matches || [];
          const m = (matches || []).find(x => x.slug === slug);
          if (!m) { showExpired(); return; }   // borrado/expirado → aviso breve y al inicio
          applyMatchState(m);
        };
        onSnapshot(doc(db, 'public', 'schedule'), (snap) => {
          if (snap.exists() && Array.isArray(snap.data().matches)) handle(snap.data().matches);
          else readSchedule().then(handle).catch(e => console.error('viewer fallback', e));
        }, (e) => { console.error('viewer onSnapshot', e); readSchedule().then(handle).catch(() => {}); });
      }

      // ── Enlaces legacy (una sola señal) ──
      function playSingle(url) {
        if (!url) { showExpired(); return; }
        currentSignalUrl = url; showViewer(); mountSingle(url);
      }
      function playLegacyLink(linkData) {
        const expiresAt = new Date(linkData.expiresAt.seconds * 1000);
        if (new Date() > expiresAt) { showExpired(); return; }
        playSingle((linkData.s1 && safeDecode(linkData.s1)) || (linkData.s2 && safeDecode(linkData.s2)) || null);
      }

      // ── Ruteo ──
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      let sIdx = parseInt(params.get('s'));
      if (isNaN(sIdx)) sIdx = null;   // señal elegida por el cliente (0 o 1)
      const s1 = params.get('s1'), s2 = params.get('s2');
      const linkId = params.get('linkId');
      const firstParamStream = (s1 && safeDecode(s1)) || (s2 && safeDecode(s2)) || null;

      if (slug) {
        try {
          const matches = await readSchedule();
          const m = matches.find(x => x.slug === slug);
          if (m) {
            try { history.replaceState(null, '', getBaseDir() + slug); } catch (_) {}
            startMatchViewer(slug);
          } else {
            const lSnap = await getDocs(linksCol);
            const linkData = lSnap.docs.map(d => d.data()).filter(d => d.slug === slug)
              .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0))[0];
            if (linkData) { try { history.replaceState(null, '', getBaseDir() + slug); } catch (_) {} playLegacyLink(linkData); }
            else showExpired();
          }
        } catch (e) { console.error('Error de ruteo (slug):', e); showExpired(); }
      } else if (linkId) {
        try {
          const lSnap = await getDocs(linksCol);
          const linkDoc = lSnap.docs.find(d => d.id === linkId);
          if (linkDoc) playLegacyLink(linkDoc.data());
          else if (firstParamStream) playSingle(firstParamStream);
          else showExpired();
        } catch (e) { console.error('Error de ruteo (linkId):', e); firstParamStream ? playSingle(firstParamStream) : showExpired(); }
      } else if (firstParamStream) {
        playSingle(firstParamStream);
      } else {
        // Sin nada que reproducir → a la lista
        window.location.replace(getBaseDir());
      }

      // ── Pantalla completa ──
      const iconFullscreen = $('icon-fullscreen');
      const updateFullscreenUI = () => {
        const isF = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        iconFullscreen.innerHTML = isF
          ? '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>'
          : '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
      };
      btnFullscreen.addEventListener('click', () => {
        const elem = viewerView;
        if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
          (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
        } else {
          (elem.requestFullscreen || elem.webkitRequestFullscreen || elem.msRequestFullscreen).call(elem);
        }
      });
      document.addEventListener('fullscreenchange', updateFullscreenUI);
      document.addEventListener('webkitfullscreenchange', updateFullscreenUI);
      document.addEventListener('msfullscreenchange', updateFullscreenUI);
    });
  </script>
</body>
</html>
